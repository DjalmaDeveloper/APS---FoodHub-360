<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>FoodHub 360</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body class="container mt-4">

<h1>FoodHub 360</h1>

<div class="row mb-4">

    <div class="col">

        <div class="card p-3">

            <h5>Total Vendas</h5>

            <h3 th:text="'R$ ' + ${dashboard.totalVendas}"></h3>

        </div>

    </div>

    <div class="col">

        <div class="card p-3">

            <h5>Tempo Médio Produção</h5>

            <h3 th:text="${dashboard.tempoMedioProducao} + ' min'"></h3>

        </div>

    </div>

</div>

<div class="mb-4">

    <span class="badge bg-primary">
        WhatsApp:
        <span th:text="${dashboard.pedidosWhatsapp}"></span>
    </span>

    <span class="badge bg-success">
        App:
        <span th:text="${dashboard.pedidosApp}"></span>
    </span>

    <span class="badge bg-dark">
        Delivery:
        <span th:text="${dashboard.pedidosDelivery}"></span>
    </span>

</div>

<a href="/cadastro"
   class="btn btn-primary mb-3">

    Novo Pedido

</a>

<table class="table table-bordered">

    <thead>

    <tr>

        <th>ID</th>
        <th>Cliente</th>
        <th>Itens</th>
        <th>Canal</th>
        <th>Status</th>
        <th>Prioridade</th>
        <th>Valor</th>
        <th>Ações</th>

    </tr>

    </thead>

    <tbody>

    <tr th:each="pedido : ${pedidos}"
        th:classappend="${pedido.prioridade.name() == 'ALTA'} ? 'table-danger'">

        <td th:text="${pedido.id}"></td>

        <td th:text="${pedido.cliente}"></td>

        <td>

            <ul class="list-unstyled">

                <li th:each="item : ${pedido.itens}">

                    <strong th:text="${item.nome}"></strong>

                    |
                    Qtd:
                    <span th:text="${item.quantidade}"></span>

                    |
                    R$
                    <span th:text="${item.precoUnitario}"></span>

                    | Subtotal:
                    <span th:text="${item.subtotal}"></span>

                </li>

            </ul>

        </td>

        <td th:text="${pedido.canal}"></td>

        <td th:text="${pedido.status}"></td>

        <td th:text="${pedido.prioridade}"></td>

        <td th:text="'R$ ' + ${pedido.valor}"></td>

        <td>

            <form th:action="@{/status/{id}(id=${pedido.id})}"
                  method="post">

                <select name="status"
                        class="form-select mb-2">

                    <option value="ABERTO">
                        Aberto
                    </option>

                    <option value="EM_PREPARO">
                        Em Preparo
                    </option>

                    <option value="CONCLUIDO">
                        Concluído
                    </option>

                </select>

                <button class="btn btn-warning btn-sm">
                    Atualizar
                </button>

            </form>

        </td>

    </tr>

    </tbody>

</table>

</body>
</html>
